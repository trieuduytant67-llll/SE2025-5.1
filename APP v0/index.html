<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.">
        <title> VR web</title>
        <!-- custom-css-link -->
        <link rel="stylesheet" href="style.css">
        <!-- boxicons-link -->
        <link rel="stylesheet" 
        href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
        <!-- custom-google-font-link -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

    </head>
    <body>
        <!-- custom-html-content -->
        <header>
            <div class="logo">
                <a href="#"><img src="image/web.logo.png"></a>
            </div>

            <div class="navigation">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Specs</a></li>
                <li><a href="#">Model</a></li>

                <div class="navbar-btn">
                    <a href="#" class="nav-btn">Add to card <span>
                        <i class='bx bx-cart'></i>
                    </span></a>
                </div>
            </div>
            
            <div class="bx bx-menu" id="menu-icon">

            </div>
        </header>
        <!--website home page html-->
        <section class="home-page">
            <div class="home-text">
                <h4>#VR </h4>
                <h1>Your <span class="trans-text"> portal </span> to <br> virtual <span class="gradient-text"> adventure </span> </h1>
                <p>Sample text</p>

                <div class="home-btn">
                    <a href="#" class="btn">Shop Now <span> <i class='bx bx-shopping-bag'></i> </span> </a>
                </div> 
            </div>

            <div class="home-img">
                <img src="image/tr-bg 1.png" alt="VR Tech">
            </div>
        </section>

        <div class="web-humb">
            <div class="humb-img">
                <img src="image/models.png" alt="">
            </div>

        </div>


        <script src="script.js"></script>
    </body>
</html>
